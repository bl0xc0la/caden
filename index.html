<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Caden IDE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: linear-gradient(135deg, #0b0e14, #0f172a);
  --panel: rgba(20,25,40,0.85);
  --border: rgba(255,255,255,0.08);
  --accent: #00ff88;
  --text: #e6edf3;
}

body {
  margin: 0;
  display: flex;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 15px;
  backdrop-filter: blur(20px);
}

.file {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
.file:hover { background: rgba(255,255,255,0.05); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; }

.tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 10px 15px;
  cursor: pointer;
}
.tab.active {
  background: rgba(0,255,136,0.1);
}

.topbar {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

button {
  background: linear-gradient(135deg, #00ff88, #00cfff);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* Workspace */
.workspace {
  flex: 1;
  display: flex;
}

#editor {
  width: 60%;
  height: 100%;
}

.output {
  width: 40%;
  background: #05080f;
  border-left: 1px solid var(--border);
  padding: 10px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Files</h3>
  <div id="fileList"></div>
  <div class="file" onclick="newFile()">+ New File</div>
</div>

<div class="main">
  <div class="tabs" id="tabs"></div>

  <div class="topbar">
    <button onclick="runCode()">Run ▶</button>
    <button onclick="saveFiles()">Save</button>
    <button onclick="publish()">Publish</button>
  </div>

  <div class="workspace">
    <div id="editor"></div>
    <div class="output" id="output">Output...</div>
  </div>
</div>

<!-- Monaco CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<script>
let editor;
let files = JSON.parse(localStorage.getItem("caden_files") || "{}");

if (Object.keys(files).length === 0) {
  files["main.cdn"] = `create.label title
title.text = "Welcome to Caden IDE"`;
}

let currentFile = Object.keys(files)[0];

/* ---------- MONACO SETUP ---------- */
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

require(['vs/editor/editor.main'], function () {

  monaco.languages.register({ id: 'caden' });

  monaco.languages.setMonarchTokensProvider('caden', {
    tokenizer: {
      root: [
        [/create\.(button|label|input)/, "keyword"],
        [/on click|scene|end|switch scene/, "keyword"],
        [/set theme|animate\.move|open\.url/, "keyword"],
        [/"[^"]*"/, "string"],
        [/\d+/, "number"]
      ]
    }
  });

  monaco.languages.registerCompletionItemProvider('caden', {
    provideCompletionItems: () => {
      return {
        suggestions: [
          { label: 'create.button', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'create.button ' },
          { label: 'create.label', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'create.label ' },
          { label: 'create.input', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'create.input ' },
          { label: 'on click', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'on click name\n    \nend' },
          { label: 'scene', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'scene main\n\nend' },
          { label: 'animate.move', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'animate.move name to x y speed 0.1' }
        ]
      };
    }
  });

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: files[currentFile],
    language: 'caden',
    theme: 'vs-dark',
    automaticLayout: true
  });

});

/* ---------- FILE SYSTEM ---------- */
function renderFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  Object.keys(files).forEach(name => {
    let el = document.createElement("div");
    el.className = "file";
    el.innerText = name;
    el.onclick = () => openFile(name);
    list.appendChild(el);
  });
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  Object.keys(files).forEach(name => {
    let tab = document.createElement("div");
    tab.className = "tab " + (name === currentFile ? "active" : "");
    tab.innerText = name;
    tab.onclick = () => openFile(name);
    tabs.appendChild(tab);
  });
}

function openFile(name) {
  currentFile = name;
  editor.setValue(files[name]);
  renderTabs();
}

function newFile() {
  let name = prompt("File name");
  if (!name) return;
  files[name] = "";
  openFile(name);
  renderFiles();
}

function saveFiles() {
  files[currentFile] = editor.getValue();
  localStorage.setItem("caden_files", JSON.stringify(files));
}

/* ---------- SHARE ---------- */
function publish() {
  saveFiles();
  const data = btoa(JSON.stringify(files));
  const url = location.origin + location.pathname + "?code=" + data;
  prompt("Share this link:", url);
}

/* Load shared */
const params = new URLSearchParams(location.search);
if (params.get("code")) {
  files = JSON.parse(atob(params.get("code")));
}

/* ---------- RUN ---------- */
function runCode() {
  saveFiles();
  const output = document.getElementById("output");
  output.innerHTML = "";

  let vars = {};
  let code = editor.getValue().split("\n");

  code.forEach(line => {
    line = line.trim();

    if (line.startsWith("create.label")) {
      let name = line.split(" ")[1];
      vars[name] = { text: "" };
    }

    if (line.includes(".text")) {
      let [l, r] = line.split("=");
      let obj = l.split(".")[0].trim();
      vars[obj].text = r.replace(/"/g, "").trim();
    }
  });

  for (let k in vars) {
    let el = document.createElement("div");
    el.innerText = vars[k].text;
    el.style.padding = "8px";
    el.style.margin = "6px 0";
    el.style.background = "rgba(0,255,136,0.1)";
    el.style.borderRadius = "8px";
    output.appendChild(el);
  }
}

/* INIT */
renderFiles();
renderTabs();
</script>

</body>
</html>
