<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Caden Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  font-family: system-ui;
  background: #0b0e14;
  color: #e6edf3;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #111827;
  border-right: 1px solid #1f2937;
  display: flex;
  flex-direction: column;
}

.sidebar h3 {
  padding: 10px;
  margin: 0;
  border-bottom: 1px solid #1f2937;
}

.file {
  padding: 8px 10px;
  cursor: pointer;
}

.file:hover {
  background: #1f2937;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar {
  height: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 10px;
  background: #111827;
  border-bottom: 1px solid #1f2937;
}

button {
  background: #22c55e;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* TABS */
.tabs {
  display: flex;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
  overflow-x: auto;
}

.tab {
  padding: 8px 12px;
  cursor: pointer;
  border-right: 1px solid #1f2937;
  white-space: nowrap;
}

.tab.active {
  background: #1f2937;
}

/* EDITOR AREA */
.content {
  flex: 1;
  display: flex;
}

textarea {
  flex: 1;
  background: #0d1117;
  color: #fff;
  border: none;
  padding: 12px;
  font-family: monospace;
  outline: none;
}

/* OUTPUT */
.output {
  width: 40%;
  background: #05080f;
  border-left: 1px solid #1f2937;
  padding: 10px;
  overflow: auto;
}

/* COMMAND PALETTE */
#cmd {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  background: #111827;
  border: 1px solid #374151;
  display: none;
  flex-direction: column;
}

#cmd input {
  padding: 10px;
  border: none;
  outline: none;
  background: #0b0e14;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Explorer</h3>
  <div id="files"></div>
</div>

<div class="main">

  <div class="topbar">
    <button onclick="run()">Run</button>
    <button onclick="save()">Save</button>
    <button onclick="newFile()">New</button>
    <button onclick="toggleCmd()">Cmd</button>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="content">
    <textarea id="editor"></textarea>
    <div class="output" id="out">Output</div>
  </div>
</div>

<div id="cmd">
  <input placeholder="Type command..." onkeydown="cmdEnter(event)">
</div>

<script>
let files = JSON.parse(localStorage.getItem("caden") || "{}");

if (Object.keys(files).length === 0) {
  files["main.cdn"] = `create.label title\ntitle.text = "Hello Caden Studio"`;
}

let current = Object.keys(files)[0];

/* ---------- SAFE LOAD ---------- */
function sync() {
  document.getElementById("editor").value = files[current] || "";
}

/* ---------- UI ---------- */
function render() {
  const f = document.getElementById("files");
  const t = document.getElementById("tabs");

  f.innerHTML = "";
  t.innerHTML = "";

  Object.keys(files).forEach(name => {
    let d = document.createElement("div");
    d.className = "file";
    d.innerText = name;
    d.onclick = () => open(name);
    f.appendChild(d);

    let tab = document.createElement("div");
    tab.className = "tab" + (name === current ? " active" : "");
    tab.innerText = name;
    tab.onclick = () => open(name);
    t.appendChild(tab);
  });
}

function open(name) {
  if (!files[name]) return;
  current = name;
  sync();
  render();
}

/* ---------- FILES ---------- */
function newFile() {
  let n = prompt("File name");
  if (!n) return;
  files[n] = "";
  current = n;
  render();
  sync();
}

function save() {
  files[current] = document.getElementById("editor").value;
  localStorage.setItem("caden", JSON.stringify(files));
}

/* ---------- RUN ENGINE (FIXED) ---------- */
function run() {
  save();

  const out = document.getElementById("out");
  out.innerHTML = "";

  if (!current || !files[current]) return;

  const lines = (files[current] || "").split("\n");
  let vars = {};

  for (let l of lines) {
    l = l.trim();
    if (!l) continue;

    if (l.startsWith("create.label")) {
      let name = l.split(" ")[1];
      if (name) vars[name] = { text: "" };
    }

    if (l.includes(".text")) {
      let [a, b] = l.split("=");
      if (!a || !b) continue;

      let obj = a.split(".")[0].trim();
      if (!vars[obj]) vars[obj] = { text: "" };

      vars[obj].text = b.replace(/"/g, "").trim();
    }
  }

  Object.values(vars).forEach(v => {
    let d = document.createElement("div");
    d.innerText = v.text;
    d.style.padding = "6px";
    d.style.margin = "5px 0";
    d.style.background = "#0f172a";
    out.appendChild(d);
  });
}

/* ---------- CMD PALETTE ---------- */
function toggleCmd() {
  let c = document.getElementById("cmd");
  c.style.display = c.style.display === "flex" ? "none" : "flex";
}

function cmdEnter(e) {
  if (e.key === "Enter") {
    let v = e.target.value;

    if (v === "run") run();
    if (v === "save") save();
    if (v === "new") newFile();

    e.target.value = "";
    toggleCmd();
  }
}

/* ---------- EDITOR SYNC ---------- */
document.getElementById("editor").addEventListener("input", e => {
  files[current] = e.target.value;
});

/* ---------- INIT ---------- */
render();
sync();
</script>

</body>
</html>
