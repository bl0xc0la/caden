<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caden 6.0</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg,#0b0e14,#0f172a);
  color: white;
  font-family: system-ui;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: rgba(20,25,40,0.9);
  padding: 10px;
}

.file {
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}
.file:hover { background: rgba(255,255,255,0.05); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; }

.tabs { display: flex; background: rgba(20,25,40,0.9); }
.tab { padding: 10px; cursor: pointer; }
.tab.active { background: rgba(0,255,136,0.1); }

.topbar {
  padding: 10px;
  display: flex;
  gap: 10px;
  background: rgba(20,25,40,0.9);
}

button {
  background: linear-gradient(135deg,#00ff88,#00cfff);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.workspace { flex: 1; display: flex; }

#editor { width: 60%; height: 100%; }

#output {
  width: 40%;
  position: relative;
  background: #05080f;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Files</h3>
  <div id="files"></div>
  <div class="file" onclick="newFile()">+ New File</div>
</div>

<div class="main">
  <div id="tabs" class="tabs"></div>

  <div class="topbar">
    <button onclick="runCode()">Run ▶</button>
    <button onclick="save()">Save</button>
  </div>

  <div class="workspace">
    <div id="editor"></div>
    <div id="output"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<script>
let editor;
let files = {"main.cdn": `set score = 0

create.ui.text button = "Click Me"
create.ui.text label = "Score: {score}"

function.if mouseclick button
  set score = score + 1
  animation.move.up 50 button
end`};

let currentFile = "main.cdn";

/* ---------- MONACO ---------- */
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
require(['vs/editor/editor.main'], function () {

  monaco.languages.register({ id: 'caden' });

  monaco.languages.setMonarchTokensProvider('caden', {
    tokenizer: {
      root: [
        [/create\.ui\.text/, "keyword"],
        [/function\.if/, "keyword"],
        [/animation\./, "keyword"],
        [/set/, "keyword"],
        [/"[^"]*"/, "string"],
        [/\d+/, "number"]
      ]
    }
  });

  editor = monaco.editor.create(document.getElementById("editor"), {
    value: files[currentFile],
    language: "caden",
    theme: "vs-dark",
    automaticLayout: true
  });
});

/* ---------- FILE SYSTEM ---------- */
function renderFiles() {
  const el = document.getElementById("files");
  el.innerHTML = "";
  Object.keys(files).forEach(f => {
    let d = document.createElement("div");
    d.className = "file";
    d.innerText = f;
    d.onclick = () => openFile(f);
    el.appendChild(d);
  });
}

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = "";
  Object.keys(files).forEach(f => {
    let d = document.createElement("div");
    d.className = "tab " + (f===currentFile?"active":"");
    d.innerText = f;
    d.onclick = () => openFile(f);
    el.appendChild(d);
  });
}

function openFile(f) {
  currentFile = f;
  editor.setValue(files[f]);
  renderTabs();
}

function newFile() {
  let name = prompt("File name");
  if (!name) return;
  files[name] = "";
  openFile(name);
  renderFiles();
}

function save() {
  files[currentFile] = editor.getValue();
}

/* ---------- ENGINE ---------- */
function runCode() {
  save();

  const output = document.getElementById("output");
  output.innerHTML = "";

  const code = editor.getValue().split("\n");

  let ui = {};
  let vars = {};
  let handlers = {};
  let animations = [];

  let currentHandler = null;

  code.forEach(line => {
    line = line.trim();
    if (!line) return;

    if (line.startsWith("set ")) {
      let parts = line.split(" ");
      let name = parts[1];
      let value = parts.slice(3).join(" ");

      if (value.includes("+")) {
        let [a,b] = value.split("+");
        vars[name] = (vars[a.trim()]||0) + Number(b.trim());
      } else {
        vars[name] = isNaN(value) ? value.replace(/"/g,"") : Number(value);
      }
    }

    else if (line.startsWith("create.ui.text")) {
      let m = line.match(/create\.ui\.text (\w+) = "(.*)"/);
      if (!m) return;
      ui[m[1]] = {text:m[2],x:50,y:50,el:null};
    }

    else if (line.startsWith("function.if mouseclick")) {
      currentHandler = line.split(" ")[2];
      handlers[currentHandler] = [];
      return;
    }

    else if (line==="end") {
      currentHandler = null;
      return;
    }

    else if (currentHandler) {
      handlers[currentHandler].push(line);
    }
  });

  Object.entries(ui).forEach(([name,obj])=>{
    let d = document.createElement("div");

    d.style.position="absolute";
    d.style.padding="12px";
    d.style.borderRadius="12px";
    d.style.background="rgba(0,255,136,0.1)";
    d.style.boxShadow="0 10px 30px rgba(0,0,0,0.3)";
    d.style.cursor="pointer";

    obj.el=d;

    d.onclick=()=>{
      (handlers[name]||[]).forEach(cmd=>{
        if(cmd.startsWith("set ")){
          let parts=cmd.split(" ");
          let varName=parts[1];
          vars[varName]=(vars[varName]||0)+1;
        }

        if(cmd.startsWith("animation.move.up")){
          let parts=cmd.split(" ");
          animations.push({
            obj:name,
            startY:ui[name].y,
            targetY:ui[name].y-parseInt(parts[1]),
            progress:0
          });
        }
      });
    };

    output.appendChild(d);
  });

  function loop(){
    animations.forEach(a=>{
      a.progress+=0.05;
      if(a.progress>1) a.progress=1;

      let o=ui[a.obj];
      o.y=a.startY+(a.targetY-a.startY)*a.progress;

      if(a.progress===1) a.done=true;
    });

    animations=animations.filter(a=>!a.done);

    Object.values(ui).forEach(o=>{
      let text=o.text.replace(/\{(.*?)\}/g,(_,v)=>vars[v]??"");
      o.el.innerText=text;
      o.el.style.left=o.x+"px";
      o.el.style.top=o.y+"px";
    });

    requestAnimationFrame(loop);
  }

  loop();
}

/* INIT */
renderFiles();
renderTabs();
</script>

</body>
</html>
