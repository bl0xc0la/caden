<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Caden Playground</title>
<style>
body {
    margin: 0;
    font-family: monospace;
    background: #0b0e14;
    color: white;
    display: flex;
    height: 100vh;
}

/* FILE PANEL */
.sidebar {
    width: 220px;
    background: #111827;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
}

.file {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #222;
}

.file:hover {
    background: #1f2937;
}

.file.active {
    background: #00ff88;
    color: black;
    font-weight: bold;
}

/* EDITOR */
.editor {
    flex: 1;
    display: flex;
    flex-direction: column;
}

textarea {
    flex: 1;
    background: #0d1117;
    color: #00ff88;
    border: none;
    padding: 15px;
    font-size: 14px;
    outline: none;
}

/* OUTPUT */
.output {
    height: 150px;
    background: #0a0f1a;
    border-top: 1px solid #333;
    padding: 10px;
    overflow-y: auto;
    white-space: pre-wrap;
}

/* TOP BAR */
.topbar {
    display: flex;
    background: #161b22;
    padding: 10px;
    gap: 10px;
}

button {
    background: #00ff88;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    font-weight: bold;
}

/* TIPS */
.tips {
    width: 260px;
    background: #0f172a;
    border-left: 1px solid #333;
    padding: 15px;
    font-size: 13px;
    color: #cbd5e1;
}
</style>
</head>
<body>

<!-- FILE LIST -->
<div class="sidebar">
    <div class="file active" onclick="openFile('main')">main.cdn</div>
    <div class="file" onclick="openFile('guess')">guess.cdn</div>
</div>

<!-- EDITOR -->
<div class="editor">
    <div class="topbar">
        <button onclick="run()">Run</button>
        <button onclick="reset()">Reset</button>
    </div>

    <textarea id="code"></textarea>
    <div class="output" id="out"></div>
</div>

<!-- TIPS -->
<div class="tips">
    <h3>💡 Tips</h3>
    <ul>
        <li>Use <b>set x to 5</b> to create variables</li>
        <li>Use <b>say x</b> to print values</li>
        <li>Use <b>ask "?" into name</b> for input</li>
        <li>Use <b>if x is 5:</b> for conditions</li>
    </ul>

    <h3>📘 Example</h3>
    <pre>
set name to "Caden"
say name
    </pre>
</div>

<script>
/* ---------------- Caden Engine ---------------- */
class Caden {
    constructor() {
        this.vars = {};
        this.output = "";
    }

    log(t) {
        this.output += t + "\n";
    }

    parse(v) {
        v = v.trim();

        if (!isNaN(v)) return Number(v);
        if (v.startsWith('"')) return v.replaceAll('"','');
        return this.vars[v] ?? v;
    }

    runLine(line) {
        line = line.trim();
        if (!line) return;

        const parts = line.split(" ");

        if (parts[0] === "set") {
            this.vars[parts[1]] = this.parse(line.split("to")[1]);
            return;
        }

        if (parts[0] === "say") {
            this.log(this.parse(line.slice(4)));
            return;
        }

        if (parts[0] === "ask") {
            const q = line.split("ask")[1].split("into")[0];
            const name = parts[parts.length - 1];
            this.vars[name] = prompt(q);
            return;
        }

        this.log("Error: " + line);
    }

    run(code) {
        this.output = "";
        code.split("\n").forEach(l => this.runLine(l));
        return this.output;
    }
}

/* ---------------- FILE SYSTEM ---------------- */
const files = {
    main: `set name to "Caden"
say "Welcome to Caden!"
say name`,

    guess: `set secret to 5
say "Guess a number"
ask "Your guess?" into g
say g`
};

let currentFile = "main";
const editor = document.getElementById("code");
const out = document.getElementById("out");

function openFile(name) {
    currentFile = name;
    editor.value = files[name];

    document.querySelectorAll(".file").forEach(f => f.classList.remove("active"));
    event.target.classList.add("active");
}

function run() {
    const c = new Caden();
    out.textContent = c.run(editor.value);
}

function reset() {
    editor.value = files[currentFile];
    out.textContent = "";
}

/* INIT */
editor.value = files.main;
</script>

</body>
</html>
