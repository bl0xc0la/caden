<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Caden Playground</title>
<style>
    body {
        margin: 0;
        font-family: monospace;
        background: #0b0e14;
        color: white;
        display: flex;
        height: 100vh;
    }

    .left {
        width: 50%;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #333;
    }

    textarea {
        flex: 1;
        background: #0d1117;
        color: #00ff88;
        border: none;
        padding: 15px;
        font-size: 14px;
        outline: none;
        resize: none;
    }

    button {
        background: #00ff88;
        border: none;
        padding: 12px;
        cursor: pointer;
        font-weight: bold;
    }

    .right {
        width: 50%;
        display: flex;
        flex-direction: column;
    }

    .output {
        flex: 1;
        padding: 15px;
        white-space: pre-wrap;
        overflow-y: auto;
    }

    .title {
        padding: 10px;
        background: #161b22;
        border-bottom: 1px solid #333;
    }
</style>
</head>
<body>

<div class="left">
    <textarea id="code">
set name to "Caden"
say "Hello"
say name
ask "What is your age?" into age
say age
    </textarea>
    <button onclick="runCaden()">Run Caden</button>
</div>

<div class="right">
    <div class="title">Output</div>
    <div class="output" id="output"></div>
</div>

<script>
class Interpreter {
    constructor() {
        this.vars = {};
        this.output = "";
    }

    log(text) {
        this.output += text + "\n";
    }

    parseValue(v) {
        v = v.trim();

        if (v.startsWith('"') && v.endsWith('"')) {
            return v.slice(1, -1);
        }

        if (!isNaN(v)) return Number(v);

        return this.vars[v] ?? v;
    }

    runLine(line) {
        line = line.trim();
        if (!line) return;

        const tokens = line.split(" ");

        // SET
        if (tokens[0] === "set") {
            const name = tokens[1];
            const value = line.split("to")[1].trim();
            this.vars[name] = this.parseValue(value);
            return;
        }

        // SAY
        if (tokens[0] === "say") {
            const value = this.parseValue(line.slice(4));
            this.log(value);
            return;
        }

        // ASK
        if (tokens[0] === "ask") {
            const question = line.split("ask")[1].split("into")[0].trim();
            const varName = tokens[tokens.length - 1];

            const answer = prompt(question);
            this.vars[varName] = answer;
            return;
        }

        this.log("Error: " + line);
    }

    run(code) {
        this.output = "";
        const lines = code.split("\n");

        for (let line of lines) {
            this.runLine(line);
        }

        return this.output;
    }
}

function runCaden() {
    const code = document.getElementById("code").value;
    const interpreter = new Interpreter();
    const output = interpreter.run(code);

    document.getElementById("output").textContent = output;
}
</script>

</body>
</html>
