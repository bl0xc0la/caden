<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caden 6.0 Playground</title>

<style>
:root {
    --bg-dark: #0b0e14;
    --bg-sidebar: #161b22;
    --accent: #00ff88;
    --accent-glow: rgba(0, 255, 136, 0.3);
    --border: #30363d;
    --text-muted: #8b949e;
}

body {
    margin: 0;
    display: flex;
    height: 100vh;
    background-color: var(--bg-dark);
    color: white;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 20px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
}

#files {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.file {
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    color: #c9d1d9;
    transition: 0.2s;
    display: flex;
    align-items: center;
}

.file:before {
    content: "📄";
    margin-right: 10px;
    font-size: 0.8rem;
}

.file:hover { background: rgba(255,255,255,0.05); }
.file.active { background: rgba(0,255,136,0.1); color: var(--accent); }

.new-file-btn {
    margin: 10px;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-muted);
}

.new-file-btn:hover { border-color: var(--accent); color: white; }

/* Main Area */
.main { flex: 1; display: flex; flex-direction: column; }

.topbar {
    height: 50px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border);
}

.logo { font-weight: 800; color: var(--accent); letter-spacing: 1px; }

.controls { display: flex; gap: 10px; }

button {
    background: #21262d;
    border: 1px solid var(--border);
    color: white;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

button.run-btn {
    background: var(--accent);
    color: #0d1117;
    border: none;
}

button:hover { background: #30363d; }
button.run-btn:hover { opacity: 0.9; box-shadow: 0 0 15px var(--accent-glow); }

/* Editor & Output */
.workspace { flex: 1; display: flex; }

#editor { width: 55%; height: 100%; border-right: 1px solid var(--border); }

.output-container {
    width: 45%;
    display: flex;
    flex-direction: column;
    background: #000;
}

.output-header {
    background: #161b22;
    padding: 5px 15px;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
}

#output {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at center, #0d1117 0%, #000 100%);
}

/* Scrollbars */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
</style>
</head>

<body>

<div class="sidebar">
    <div class="sidebar-header">Explorer</div>
    <div id="files"></div>
    <div class="new-file-btn" onclick="newFile()">+ New Caden File</div>
</div>

<div class="main">
    <div class="topbar">
        <div class="logo">CADEN 6.0</div>
        <div class="controls">
            <button onclick="save()">Save</button>
            <button class="run-btn" onclick="runCode()">Run ▶</button>
        </div>
    </div>

    <div class="workspace">
        <div id="editor"></div>
        <div class="output-container">
            <div class="output-header">LIVE PREVIEW</div>
            <div id="output"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<script>
let editor;
let files = {"main.cdn": `set score = 0

create.ui.text button = "Click Me"
create.ui.text label = "Score: {score}"

function.if mouseclick button
  set score = score + 1
  animation.move.up 50 button
end`};

let currentFile = "main.cdn";

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
require(['vs/editor/editor.main'], function () {
    monaco.languages.register({ id: 'caden' });
    monaco.languages.setMonarchTokensProvider('caden', {
        tokenizer: {
            root: [
                [/create\.ui\.text|function\.if|animation\.move\.up|set|end/, "keyword"],
                [/"[^"]*"/, "string"],
                [/\d+/, "number"],
                [/\/\/.*$/, "comment"],
            ]
        }
    });

    monaco.editor.defineTheme('caden-theme', {
        base: 'vs-dark',
        inherit: true,
        rules: [{ token: 'keyword', foreground: '00ff88', fontStyle: 'bold' }],
        colors: { 'editor.background': '#0b0e14' }
    });

    editor = monaco.editor.create(document.getElementById("editor"), {
        value: files[currentFile],
        language: "caden",
        theme: "caden-theme",
        automaticLayout: true,
        fontSize: 14,
        minimap: { enabled: false }
    });
});

function renderFiles() {
    const el = document.getElementById("files");
    el.innerHTML = "";
    Object.keys(files).forEach(f => {
        let d = document.createElement("div");
        d.className = "file " + (f === currentFile ? "active" : "");
        d.innerText = f;
        d.onclick = () => openFile(f);
        el.appendChild(d);
    });
}

function openFile(f) {
    save();
    currentFile = f;
    editor.setValue(files[f]);
    renderFiles();
}

function newFile() {
    let name = prompt("File name (e.g. game.cdn)");
    if (!name) return;
    if (!name.endsWith(".cdn")) name += ".cdn";
    files[name] = "// New script";
    openFile(name);
    renderFiles();
}

function save() {
    files[currentFile] = editor.getValue();
}

/* ---------- ENGINE ---------- */
let animationId = null;

function runCode() {
    if (animationId) cancelAnimationFrame(animationId);
    save();

    const output = document.getElementById("output");
    output.innerHTML = "";

    const code = editor.getValue().split("\n");
    let ui = {};
    let vars = {};
    let handlers = {};
    let animations = [];
    let currentHandler = null;

    // Parse logic
    code.forEach(line => {
        line = line.trim();
        if (!line || line.startsWith("//")) return;

        if (line.startsWith("set ")) {
            let parts = line.split("=");
            let name = parts[0].replace("set ", "").trim();
            let value = parts[1]?.trim();
            vars[name] = isNaN(value) ? value?.replace(/"/g,"") : Number(value);
        }
        else if (line.startsWith("create.ui.text")) {
            let m = line.match(/create\.ui\.text (\w+) = "(.*)"/);
            if (m) ui[m[1]] = { text: m[2], x: 50, y: 100 + (Object.keys(ui).length * 60), el: null };
        }
        else if (line.startsWith("function.if mouseclick")) {
            currentHandler = line.split(" ")[2];
            handlers[currentHandler] = [];
        }
        else if (line === "end") {
            currentHandler = null;
        }
        else if (currentHandler) {
            handlers[currentHandler].push(line);
        }
    });

    // Create UI Elements
    Object.entries(ui).forEach(([name, obj]) => {
        let d = document.createElement("div");
        d.style.position = "absolute";
        d.style.padding = "15px 25px";
        d.style.borderRadius = "8px";
        d.style.background = "rgba(0,255,136,0.15)";
        d.style.border = "1px solid var(--accent)";
        d.style.color = "white";
        d.style.fontWeight = "bold";
        d.style.boxShadow = "0 4px 15px rgba(0,0,0,0.5)";
        d.style.cursor = "pointer";
        d.style.userSelect = "none";
        d.style.transition = "transform 0.1s";

        obj.el = d;
        d.onmousedown = () => d.style.transform = "scale(0.95)";
        d.onmouseup = () => d.style.transform = "scale(1)";

        d.onclick = () => {
            (handlers[name] || []).forEach(cmd => {
                if (cmd.startsWith("set ")) {
                    let parts = cmd.split("=");
                    let varName = parts[0].replace("set ", "").trim();
                    let math = parts[1].trim();
                    if (math.includes("+")) {
                        let [v, inc] = math.split("+");
                        vars[varName] = (vars[v.trim()] || 0) + Number(inc.trim());
                    }
                }
                if (cmd.startsWith("animation.move.up")) {
                    let val = cmd.split(" ").slice(-2, -1)[0];
                    animations.push({ obj: name, startY: ui[name].y, targetY: ui[name].y - parseInt(val), progress: 0 });
                }
            });
        };
        output.appendChild(d);
    });

    function loop() {
        animations.forEach(a => {
            a.progress += 0.1;
            if (a.progress > 1) a.progress = 1;
            ui[a.obj].y = a.startY + (a.targetY - a.startY) * a.progress;
            if (a.progress === 1) a.done = true;
        });
        animations = animations.filter(a => !a.done);

        Object.values(ui).forEach(o => {
            let text = o.text.replace(/\{(.*?)\}/g, (_, v) => vars[v.trim()] ?? 0);
            o.el.innerText = text;
            o.el.style.left = o.x + "px";
            o.el.style.top = o.y + "px";
        });
        animationId = requestAnimationFrame(loop);
    }
    loop();
}

renderFiles();
</script>

</body>
</html>
