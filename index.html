<!DOCTYPE html>
<html>
<head>
<title>Caden 6.2 Playground</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

#editor {
  width: 50%;
  background: #1e1e2f;
  color: #fff;
  border: none;
  padding: 15px;
  font-family: monospace;
  font-size: 14px;
}

#right {
  width: 50%;
  display: flex;
  flex-direction: column;
}

#toolbar {
  padding: 10px;
  background: #151525;
  border-bottom: 1px solid #333;
}

button {
  padding: 8px 12px;
  background: #0078ff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

#preview {
  flex: 1;
  position: relative;
  background: #0f0f1a;
}
.ui {
  position: absolute;
}
.button {
  background: #0078ff;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
.input {
  background: #222;
  padding: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<textarea id="editor">
scene main

create.label title
title.text = "Caden 6.2 Playground"
title.x = 200
title.y = 50

create.input input
input.x = 200
input.y = 150

create.button btn
btn.text = "Double"
btn.x = 200
btn.y = 220

create.label result
result.x = 200
result.y = 300

on click btn
value = input * 2
result.text = "Result: {value}"
end

end
</textarea>

<div id="right">
  <div id="toolbar">
    <button onclick="run()">Run</button>
  </div>
  <div id="preview"></div>
</div>

<script>
function run() {
  const code = document.getElementById("editor").value;
  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  let vars = {};
  let ui = {};
  let clickHandlers = {};

  function format(text) {
    return text.replace(/\{(.*?)\}/g, (_, v) => vars[v] ?? "");
  }

  function evalExpr(expr) {
    try {
      for (let k in vars) {
        expr = expr.replaceAll(k, vars[k]);
      }
      return eval(expr);
    } catch {
      return expr;
    }
  }

  const lines = code.split("\n").map(l => l.trim()).filter(l => l);
  let i = 0;

  while (i < lines.length) {
    let l = lines[i];

    if (l.startsWith("create.button")) {
      let name = l.split(" ")[1];
      ui[name] = { type:"button", x:100, y:100, text:name };
    }

    if (l.startsWith("create.label")) {
      let name = l.split(" ")[1];
      ui[name] = { type:"label", x:50, y:50, text:"" };
    }

    if (l.startsWith("create.input")) {
      let name = l.split(" ")[1];
      ui[name] = { type:"input", x:100, y:200, text:"" };
    }

    if (l.includes("=")) {
      let [left, right] = l.split("=");
      left = left.trim();
      right = right.trim();

      let val;

      if (right.startsWith('"')) {
        val = format(right.replaceAll('"', ''));
      } else {
        val = evalExpr(right);
      }

      if (left.includes(".")) {
        let [obj, prop] = left.split(".");
        if (ui[obj]) ui[obj][prop] = val;
      } else {
        vars[left] = val;
      }
    }

    if (l.startsWith("on click")) {
      let name = l.split(" ")[2];
      let body = [];
      i++;
      while (lines[i] !== "end") {
        body.push(lines[i]);
        i++;
      }
      clickHandlers[name] = body;
    }

    i++;
  }

  function exec(line) {
    if (line.includes("=")) {
      let [left, right] = line.split("=");
      left = left.trim();
      right = right.trim();

      let val;

      if (right.startsWith('"')) {
        val = format(right.replaceAll('"',''));
      } else {
        val = evalExpr(right);
      }

      if (left.includes(".")) {
        let [obj, prop] = left.split(".");
        if (ui[obj]) ui[obj][prop] = val;
      } else {
        vars[left] = val;
      }
    }
  }

  // Render UI
  for (let name in ui) {
    let u = ui[name];
    let el = document.createElement("div");
    el.classList.add("ui");

    el.style.left = u.x + "px";
    el.style.top = u.y + "px";

    if (u.type === "button") {
      el.classList.add("button");
      el.innerText = format(u.text);

      el.onclick = () => {
        (clickHandlers[name] || []).forEach(exec);
        run(); // re-render
      };
    }

    if (u.type === "label") {
      el.innerText = format(u.text);
    }

    if (u.type === "input") {
      let input = document.createElement("input");
      input.classList.add("input");
      input.value = u.text;

      input.oninput = (e) => {
        vars[name] = e.target.value;
      };

      el.appendChild(input);
    }

    preview.appendChild(el);
  }
}
</script>

</body>
</html>
