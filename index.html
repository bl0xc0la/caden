<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Caden IDE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: linear-gradient(135deg, #0b0e14, #0f172a);
  --panel: rgba(20, 25, 40, 0.8);
  --border: rgba(255,255,255,0.08);
  --accent: #00ff88;
  --text: #e6edf3;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  background: var(--panel);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  padding: 15px;
}

.file {
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.file:hover {
  background: rgba(255,255,255,0.05);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.tab {
  padding: 10px 15px;
  cursor: pointer;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}

.tab.active {
  background: rgba(0,255,136,0.1);
}

.topbar {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

button {
  background: linear-gradient(135deg, #00ff88, #00cfff);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.workspace {
  flex: 1;
  display: flex;
}

textarea {
  flex: 1;
  background: #0d1117;
  color: #fff;
  border: none;
  padding: 15px;
  font-family: monospace;
  font-size: 14px;
  outline: none;
}

.output {
  width: 40%;
  background: #05080f;
  border-left: 1px solid var(--border);
  padding: 10px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Files</h3>
  <div id="fileList"></div>
  <div class="file" onclick="newFile()">+ New File</div>
</div>

<div class="main">

  <div class="tabs" id="tabs"></div>

  <div class="topbar">
    <button onclick="runCode()">Run ▶</button>
    <button onclick="saveFiles()">Save</button>
    <button onclick="publish()">Publish</button>
  </div>

  <div class="workspace">
    <textarea id="editor"></textarea>
    <div class="output" id="output">Output...</div>
  </div>

</div>

<script>
/* ---------- LOAD ---------- */
let files = JSON.parse(localStorage.getItem("caden_files") || "{}");

const params = new URLSearchParams(location.search);
if (params.get("code")) {
  try {
    files = JSON.parse(atob(params.get("code")));
  } catch (e) {
    files = { "main.cdn": "create.label title\ntitle.text = \"Broken import\"" };
  }
}

if (!files || Object.keys(files).length === 0) {
  files = {
    "main.cdn": `create.label title\ntitle.text = "Welcome to Caden IDE"`
  };
}

let currentFile = Object.keys(files)[0] || null;

/* ---------- SAFE EDITOR SYNC ---------- */
function syncEditor() {
  const ed = document.getElementById("editor");
  if (currentFile && files[currentFile] !== undefined) {
    ed.value = files[currentFile];
  } else {
    ed.value = "";
  }
}

/* ---------- UI ---------- */
function renderFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  Object.keys(files).forEach(name => {
    const el = document.createElement("div");
    el.className = "file";
    el.innerText = name;
    el.onclick = () => openFile(name);
    list.appendChild(el);
  });
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  Object.keys(files).forEach(name => {
    const tab = document.createElement("div");
    tab.className = "tab" + (name === currentFile ? " active" : "");
    tab.innerText = name;
    tab.onclick = () => openFile(name);
    tabs.appendChild(tab);
  });
}

function openFile(name) {
  if (!files[name]) return;

  currentFile = name;
  syncEditor();
  renderTabs();
}

function newFile() {
  const name = prompt("File name (example.cdn)");
  if (!name) return;

  files[name] = "";
  currentFile = name;

  renderFiles();
  renderTabs();
  syncEditor();
}

/* ---------- SAVE ---------- */
function saveFiles() {
  if (currentFile) {
    files[currentFile] = document.getElementById("editor").value;
  }
  localStorage.setItem("caden_files", JSON.stringify(files));
}

/* ---------- SHARE ---------- */
function publish() {
  saveFiles();
  const data = btoa(JSON.stringify(files));
  const url = location.origin + location.pathname + "?code=" + data;
  prompt("Share this link:", url);
}

/* ---------- RUNNER ---------- */
function runCode() {
  saveFiles();

  const output = document.getElementById("output");
  output.innerHTML = "";

  const vars = {};
  const code = (files[currentFile] || "").split("\n");

  for (let raw of code) {
    let line = raw.trim();
    if (!line) continue;

    if (line.startsWith("create.label")) {
      const name = line.split(" ")[1];
      if (name) vars[name] = { type: "label", text: "" };
    }

    if (line.includes(".text")) {
      const [l, r] = line.split("=");
      if (!l || !r) continue;

      const obj = l.split(".")[0].trim();
      if (!vars[obj]) vars[obj] = { type: "label", text: "" };

      vars[obj].text = r.replace(/"/g, "").trim();
    }
  }

  Object.values(vars).forEach(v => {
    const el = document.createElement("div");
    el.innerText = v.text || "";
    el.style.padding = "8px";
    el.style.margin = "6px 0";
    el.style.background = "rgba(0,255,136,0.1)";
    el.style.borderRadius = "8px";
    output.appendChild(el);
  });
}

/* ---------- EDITOR LIVE SYNC ---------- */
document.getElementById("editor").addEventListener("input", () => {
  if (currentFile) {
    files[currentFile] = document.getElementById("editor").value;
  }
});

/* ---------- INIT ---------- */
renderFiles();
renderTabs();
syncEditor();
</script>

</body>
</html>
