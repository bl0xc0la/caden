<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Caden Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #0b0e14;
  --panel: #111826;
  --accent: #00ff88;
  --text: #fff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui;
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: var(--panel);
  padding: 15px;
  border-right: 1px solid #222;
}

.file {
  padding: 8px;
  cursor: pointer;
  border-radius: 6px;
}

.file:hover {
  background: #1c2433;
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Top bar */
.topbar {
  background: var(--panel);
  padding: 10px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #222;
}

button {
  background: var(--accent);
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

/* Editor + Output */
.workspace {
  flex: 1;
  display: flex;
}

textarea {
  flex: 1;
  background: #0d1117;
  color: #fff;
  border: none;
  padding: 15px;
  font-family: monospace;
  font-size: 14px;
  outline: none;
}

.output {
  width: 40%;
  background: #05080f;
  padding: 10px;
  border-left: 1px solid #222;
  overflow: auto;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h3>Files</h3>
  <div class="file" onclick="loadFile('main')">main.cdn</div>
  <div class="file" onclick="newFile()">+ New File</div>
</div>

<!-- Main -->
<div class="main">

  <div class="topbar">
    <button onclick="runCode()">Run ▶</button>
    <button onclick="saveFile()">Save 💾</button>
  </div>

  <div class="workspace">
    <textarea id="editor"></textarea>
    <div class="output" id="output">Output will appear here...</div>
  </div>

</div>

<script>
let files = {
  "main": `scene main

create.label title
title.text = "Hello from Caden!"

end`
};

let currentFile = "main";

function loadFile(name) {
  currentFile = name;
  document.getElementById("editor").value = files[name];
}

function newFile() {
  const name = prompt("File name:");
  if (!name) return;
  files[name] = "";
  loadFile(name);
}

function saveFile() {
  files[currentFile] = document.getElementById("editor").value;
  alert("Saved!");
}

/* SIMPLE INTERPRETER (browser version) */
function runCode() {
  const code = document.getElementById("editor").value;
  const output = document.getElementById("output");
  output.innerHTML = "";

  let vars = {};

  code.split("\n").forEach(line => {
    line = line.trim();

    if (line.startsWith("create.label")) {
      let name = line.split(" ")[1];
      vars[name] = { type: "label", text: "" };
    }

    else if (line.includes(".text")) {
      let [left, right] = line.split("=");
      let obj = left.split(".")[0].trim();
      vars[obj].text = right.replace(/"/g, "").trim();
    }
  });

  // render
  for (let k in vars) {
    if (vars[k].type === "label") {
      let el = document.createElement("div");
      el.innerText = vars[k].text;
      output.appendChild(el);
    }
  }
}

// load default
loadFile("main");
</script>

</body>
</html>
